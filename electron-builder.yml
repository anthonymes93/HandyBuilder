appId: com.handybuilder.app
productName: HandyBuilder
directories:
  buildResources: build
  output: release
files:
  - out
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintignore,.eslintrc.cjs,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
npmRebuild: false
win:
  executableName: HandyBuilder
nsis:
  artifactName: ${name}-${version}-setup.exe
  shortcutName: ${productName}
  createDesktopShortcut: always
linux:
  target:
    - AppImage
    - deb
  maintainer: handybuilder
  category: Development
appImage:
  artifactName: ${name}-${version}.AppImage
deb:
  artifactName: ${name}-${version}.deb
